name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Lint
        run: npx eslint . --max-warnings 0
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit Tests
        run: npx vitest run --reporter=verbose
